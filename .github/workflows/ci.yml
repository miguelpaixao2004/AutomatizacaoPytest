name: CI/CD Bella Tavola - Completo

# O workflow é disparado em todo push para a main ou em Pull Requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: QUALIDADE (Roda sempre, de forma rápida)
  # ==========================================
  qualidade:
    name: Qualidade e Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Acelera a instalação guardando o pip em cache

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico do ambiente
        run: |
          echo "=== Versão do Python ==="
          python --version
          echo -e "\n=== Dependências instaladas ==="
          pip list

      - name: Verificar formatação (Black)
        run: black --check .

      - name: Verificar imports inúteis (Autoflake)
        # O -r significa recursivo (todas as pastas)
        run: autoflake --check -r .

      - name: Rodar testes rápidos (Smoke)
        run: pytest tests/ -m smoke -v
        env:
          PYTHONPATH: .

  # ==========================================
  # JOB 2: INTEGRAÇÃO (Testes pesados de ML)
  # ==========================================
  integracao:
    name: Testes de Integração de Modelo
    runs-on: ubuntu-latest
    needs: qualidade # SÓ RODA SE A QUALIDADE PASSAR
    # SÓ RODA SE FOR PUSH DIRETO NA MAIN (Evita gastar cota atoa em PRs em andamento)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache do modelo Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('requirements.txt') }}

      - name: Diagnóstico de Segurança e Token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== Status de Autenticação (Hugging Face) ==="
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ ALERTA: HF_TOKEN não configurado nos Secrets!"
            exit 1 # Falha o pipeline de propósito se não achar a senha
          else
            echo "✅ HF_TOKEN carregado em memória com sucesso!"
          fi

      - name: Rodar testes de integração
        run: pytest tests/ -m integracao -v
        env:
          PYTHONPATH: .
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Passando a senha segura para o Pytest

  # ==========================================
  # JOB 3: RELATÓRIO / AVISOS (Pós-sucesso)
  # ==========================================
  relatorio:
    name: Relatório e Deploy
    runs-on: ubuntu-latest
    needs: integracao # SÓ RODA SE O MODELO PASSOU NOS TESTES
    steps:
      - name: Resumo do Pipeline
        run: |
          echo "🎉 O pipeline de MLOps do Bella Tavola rodou com 100% de sucesso!"
          echo "👉 Commit: ${{ github.sha }}"
          echo "👤 Autor: ${{ github.actor }}"
          echo "🚀 Simulação: Se isso fosse o mundo real, o deploy aconteceria agora."